# Replace the existing PNPLabs `location` directives inside the TLS `server {}`
# block with this fragment. Do not include it alongside another `location /`.
# The Node origin is the single authority for the static allowlist, redirects,
# cache policy, and security headers. Do not add an Nginx cache in front of it.

location = /paper {
    proxy_pass http://127.0.0.1:3013;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_no_cache 1;
    proxy_cache_bypass 1;
}

