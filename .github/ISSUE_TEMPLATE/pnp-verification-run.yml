name: PNP verification run report
description: Report a reproducible run of the PNP source/checker verifier.
title: "PNP verification run: <handle> <YYYY-MM-DD>"
labels: ["pnp-verification-run"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form after cloning `aisknab/pnp` and running the verifier.

        Primary command:

        ```bash
        git clone https://github.com/aisknab/pnp.git
        cd pnp
        npm ci
        npm run pnp:verify
        ```

        A run report records reproducible machine evidence. It is not, by itself, theorem activation or release-blocker clearance.

  - type: input
    id: runner
    attributes:
      label: Runner name or handle
      description: Name, organization, or handle to list publicly if accepted into the registry.
      placeholder: "Ada Example / @ada-example"
    validations:
      required: true

  - type: input
    id: date-utc
    attributes:
      label: Run date in UTC
      placeholder: "2026-07-04"
    validations:
      required: true

  - type: input
    id: pnp-commit
    attributes:
      label: PNP commit SHA or ref tested
      placeholder: "main at <commit sha>"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, CPU architecture, Node/npm versions, container or VM details if used.
      placeholder: |
        OS:
        arch:
        node --version:
        npm --version:
    validations:
      required: true

  - type: textarea
    id: commands
    attributes:
      label: Commands run
      description: Include every command needed to reproduce your run.
      value: |
        git clone https://github.com/aisknab/pnp.git
        cd pnp
        npm ci
        npm run pnp:verify
    validations:
      required: true

  - type: textarea
    id: verdict
    attributes:
      label: Verifier result
      description: Paste the final JSON summary or the relevant final lines from `artifacts/pnp-verify-all/latest-verdict.json`.
      placeholder: |
        tag:
        claimStatus:
        publicTheoremEmissionAllowed:
        finalTheoremReady:
        remainingBlockers:
    validations:
      required: true

  - type: textarea
    id: artifacts
    attributes:
      label: Logs or artifact links
      description: Attach logs, CI run links, commit links, or checksums. Do not paste secrets.
    validations:
      required: false

  - type: checkboxes
    id: attestations
    attributes:
      label: Attestation
      options:
        - label: I ran the commands above or an equivalent documented command sequence.
          required: true
        - label: I understand this report records a verifier run and is not automatically theorem activation or release-blocker clearance.
          required: true
        - label: I am willing for my submitted name or handle to be listed in the public verification-run registry if accepted.
          required: true
