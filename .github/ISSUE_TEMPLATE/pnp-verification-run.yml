name: PNP activated verification run report
description: Report a reproducible run of the PNP source/checker verifier and activated theorem-emission status.
title: "PNP activated verification run: <handle> <YYYY-MM-DD>"
labels: ["pnp-verification-run"]
body:
  - type: markdown
    attributes:
      value: |
        The preferred path is now the one-command verifier upload flow:

        ```bash
        git clone https://github.com/aisknab/pnp.git
        cd pnp
        npm ci
        npm run verify
        ```

        When the verifier completes, it asks:

        ```text
        Upload verification run to PNP Labs? [y/N]
        ```

        Type `y` or `yes` to submit automatically when `PNPLABS_UPLOAD_TOKEN`, `GITHUB_TOKEN`, `GH_TOKEN`, or authenticated `gh` is available.

        Focused activation checks remain accepted as supporting evidence:

        ```bash
        npm run proof:activated-pnp-status
        npm run proof:public-theorem-activation
        npm run proof:unrestricted-final-soundness-release
        npm run proof:uniform-complexity-conclusion
        ```

        If automatic upload is unavailable, paste the generated body from:

        ```text
        artifacts/pnplabs-upload/latest-issue-body.md
        ```

        A run report records reproducible machine evidence for the activated checker-trust status. It is not, by itself, an external-consensus claim or peer-review acceptance.

  - type: input
    id: runner
    attributes:
      label: Runner name or handle
      description: Name, organization, or handle to list publicly if accepted into the registry.
      placeholder: "Ada Example / @ada-example"
    validations:
      required: true

  - type: input
    id: date-utc
    attributes:
      label: Run date in UTC
      placeholder: "2026-07-08"
    validations:
      required: true

  - type: input
    id: pnp-commit
    attributes:
      label: PNP commit SHA or ref tested
      placeholder: "main at <commit sha>"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, CPU architecture, Node/npm versions, container or VM details if used.
      placeholder: |
        OS:
        arch:
        node --version:
        npm --version:
    validations:
      required: true

  - type: textarea
    id: commands
    attributes:
      label: Commands run
      description: Include every command needed to reproduce your run. The preferred sequence is below.
      value: |
        git clone https://github.com/aisknab/pnp.git
        cd pnp
        npm ci
        npm run verify
    validations:
      required: true

  - type: textarea
    id: verdict
    attributes:
      label: Verifier result
      description: Paste the final JSON summary, the generated issue body summary, or relevant final lines from `artifacts/pnp-verify-all/latest-verdict.json`.
      placeholder: |
        tag: accept
        claimStatus:
        publicTheoremEmissionAllowed: true
        publicTheoremStatement: P = NP
        publicTheoremConclusion: P = NP
        finalTheoremReady: true
        unrestrictedFinalSoundnessDischarged: true
        remainingBlockers: []
    validations:
      required: true

  - type: textarea
    id: activated-status
    attributes:
      label: Activated status payload fields
      description: Paste the key fields from `status/ACTIVATED_PNP_STATUS.json`, `public/pnp-status.json`, or the generated `latest-run-record.json`.
      placeholder: |
        kind: PNPActivatedStatus0
        coordinate: PNP-ACTIVATED-STATUS-2026-07-05-01
        publicTheoremActivationCoordinate: PNP-PUBLIC-THEOREM-ACTIVATION-2026-07-05-01
        externalReviewIsMathematicalPremise: false
        statusPayloadSha256:
    validations:
      required: true

  - type: textarea
    id: proof-script-outputs
    attributes:
      label: Focused proof-script outputs
      description: Paste accept summaries, JSON paths, generated proofScriptOutputs, CI artifact links, or SHA-256 digests for the focused activation scripts if available.
      placeholder: |
        proof:activated-pnp-status:
        proof:public-theorem-activation:
        proof:unrestricted-final-soundness-release:
        proof:uniform-complexity-conclusion:
    validations:
      required: false

  - type: textarea
    id: artifacts
    attributes:
      label: Logs or artifact links
      description: Attach logs, CI run links, commit links, checksums, generated issue body, or artifact links. Do not paste secrets.
    validations:
      required: false

  - type: checkboxes
    id: attestations
    attributes:
      label: Attestation
      options:
        - label: I ran the commands above or an equivalent documented command sequence.
          required: true
        - label: I understand this report records a verifier run and is not an external-consensus claim or peer-review acceptance.
          required: true
        - label: I understand external review is audit evidence and not a mathematical premise for theorem emission.
          required: true
        - label: I am willing for my submitted name or handle to be listed in the public verification-run registry if accepted.
          required: true
