name: production-deployment-consistency

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  production-deployment-consistency:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PRODUCTION_BASE_URL: https://pnplabs.com.au
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: refs/heads/main
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - name: Verify local publication seal
        run: npm run verify:seal
      - name: Compare production with this exact commit and tree
        run: npm run verify:production -- --base-url "$PRODUCTION_BASE_URL" --json
