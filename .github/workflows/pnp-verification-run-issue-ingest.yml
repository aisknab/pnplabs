name: pnp-verification-run-issue-ingest-frozen

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  confirm-intake-frozen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Confirm historical activated-run intake remains frozen
        run: |
          node --input-type=module <<'NODE'
          import assert from 'node:assert/strict';
          import { readFile } from 'node:fs/promises';

          const registry = JSON.parse(await readFile('public/pnp-verification-runs.json', 'utf8'));
          const upload = JSON.parse(await readFile('public/pnp-one-command-upload.json', 'utf8'));

          assert.equal(registry.status, 'historical-activated-verification-run-registry-frozen');
          assert.equal(registry.intakeFrozen, true);
          assert.equal(registry.importWorkflow.acceptsNewRecords, false);
          assert.equal(upload.status, 'historical-activated-run-upload-frozen');
          assert.equal(upload.intakeFrozen, true);
          assert.equal(upload.automaticUploadEnabled, false);
          assert.equal(upload.issueIngestWorkflow.acceptsNewRecords, false);
          NODE
