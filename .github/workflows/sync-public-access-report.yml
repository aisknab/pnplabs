name: verify-current-formal-publication-artifacts

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: formal-publication-artifacts-${{ github.ref }}
  cancel-in-progress: true

env:
  PNP_CORE_COMMIT: 2079ea0df337d413c2402a3820087aea4aca9efa
  PNP_SOURCE_DIR: ${{ github.workspace }}/pnp

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: pnplabs
    steps:
      - name: Check out companion repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          path: pnplabs

      - name: Check out exact reviewed core merge
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          repository: aisknab/pnp
          ref: ${{ env.PNP_CORE_COMMIT }}
          fetch-depth: 0
          fetch-tags: true
          path: pnp

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Install PDF metadata checker
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends poppler-utils

      - name: Verify exact core artifacts without writing
        run: node tools/sync-public-access-docs.mjs --check

      - name: Verify fifty-page current report and reject historical bytes
        shell: bash
        run: |
          set -euo pipefail
          test "$(pdfinfo downloads/canonical_proof_report.pdf | awk '/^Pages:/ {print $2}')" = "50"
          cmp downloads/canonical_proof_report.pdf downloads/canonical-proof-report.pdf
          cmp downloads/canonical_proof_report.tex downloads/canonical-proof-report.tex
          test "$(sha256sum downloads/canonical_proof_report.pdf | cut -d' ' -f1)" != "53437127d4d111562689c093857de86e846c6ad4a8cf0bc0674ff0bc822e603d"
          test "$(sha256sum downloads/canonical_proof_report.tex | cut -d' ' -f1)" != "414d2a2474291c0cc2bf1098f6c937b0bf13c53243774394516bd8def355d4c7"

      - name: Verify exact seal and cross-repository coordinates
        run: |
          node tools/verify-release-seal.mjs
          node tools/check-cross-repo-targets.mjs --require-source

      - name: Run focused artifact tests
        run: |
          node --test tests/unit/formal-publication-artifacts*.test.mjs
          node --test tests/audit-targets/*.test.mjs

      - name: Enforce read-only workflow
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          test -z "$(git status --porcelain)"
