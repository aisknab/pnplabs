name: pnp-upstream-status-consistency

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  pnp-upstream-status-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Compare activated public payload with upstream PNP status
        run: |
          node --input-type=module <<'NODE'
          import assert from 'node:assert/strict';
          import { readFile } from 'node:fs/promises';

          const upstreamBase = 'https://raw.githubusercontent.com/aisknab/pnp/main';
          const activeFinalNodeIds = [
            'UFS-001-InputFamilyUniformity',
            'UFS-002-LockedNANDConstructionUniformPolynomial',
            'UFS-003-ThresholdEquivalenceAllInputs',
            'UFS-004-ResidualBandMinimizerUniformPolynomial',
            'UFS-005-ZeroSlackContradictionUniform',
            'UFS-006-NoHiddenOracleSemanticCompleteness',
            'UFS-007-ComplexityConclusionUniform',
            'UFS-008-ReleaseTransitionFromProofOnly',
            'PUBLIC-THEOREM-ACTIVATION',
          ];

          async function localJson(path) {
            return JSON.parse(await readFile(path, 'utf8'));
          }

          async function upstreamJson(path) {
            const url = `${upstreamBase}/${path}`;
            const res = await fetch(url, { headers: { accept: 'application/json' } });
            if (!res.ok) throw new Error(`failed to fetch ${url}: ${res.status} ${res.statusText}`);
            return res.json();
          }

          function stableStringify(value) {
            if (Array.isArray(value)) return `[${value.map(stableStringify).join(',')}]`;
            if (value !== null && typeof value === 'object') return `{${Object.keys(value).sort().map((key) => `${JSON.stringify(key)}:${stableStringify(value[key])}`).join(',')}}`;
            return JSON.stringify(value);
          }

          function assertActivatedBoundary(payload, label) {
            assert.equal(payload.kind, 'PNPActivatedStatus0', `${label}: kind mismatch`);
            assert.equal(payload.coordinate, 'PNP-ACTIVATED-STATUS-2026-07-05-01', `${label}: coordinate mismatch`);
            assert.equal(payload.status, 'public-theorem-emission-activated', `${label}: status mismatch`);
            assert.equal(payload.publicTheoremActivationCoordinate, 'PNP-PUBLIC-THEOREM-ACTIVATION-2026-07-05-01', `${label}: activation coordinate mismatch`);
            assert.equal(payload.publicTheoremEmissionAllowed, true, `${label}: public theorem emission must be activated`);
            assert.equal(payload.publicTheoremStatement, 'P = NP', `${label}: theorem statement mismatch`);
            assert.equal(payload.publicTheoremConclusion, 'P = NP', `${label}: theorem conclusion mismatch`);
            assert.equal(payload.publicTheoremUnderCheckerTrustModel, true, `${label}: checker-trust flag mismatch`);
            assert.equal(payload.finalTheoremReady, true, `${label}: final theorem must be ready`);
            assert.equal(payload.internalFinalTheoremReady, true, `${label}: internal final theorem must be ready`);
            assert.equal(payload.unrestrictedFinalSoundnessDischarged, true, `${label}: unrestricted final soundness must be discharged`);
            assert.equal(payload.uniformFinalSoundnessProved, true, `${label}: uniform final soundness must be proved`);
            assert.equal(payload.externalReviewAcceptanceRequiredForEmission, false, `${label}: external review must not be required for emission`);
            assert.equal(payload.externalReviewIsMathematicalPremise, false, `${label}: external review must not be a mathematical premise`);
            assert.equal(payload.historicalReportProseIsMathematicalPremise, false, `${label}: historical report prose must not be a premise`);
            assert.deepEqual(payload.remainingBlockers, [], `${label}: blockers must be empty`);
            assert.deepEqual(payload.activeFinalNodeIds, activeFinalNodeIds, `${label}: active final nodes mismatch`);
          }

          const [siteStatus, index, upstreamStatus] = await Promise.all([
            localJson('public/pnp-status.json'),
            localJson('public/pnp-index.json'),
            upstreamJson('public/pnp-status.json'),
          ]);

          assertActivatedBoundary(siteStatus, 'site activated status payload');
          assertActivatedBoundary(upstreamStatus, 'upstream activated status payload');

          assert.equal(stableStringify(siteStatus), stableStringify(upstreamStatus), 'site activated status payload drifted from upstream pnp/public/pnp-status.json');

          assert.equal(index.status, 'activated-status-payloads-ready', 'index status mismatch');
          assert.equal(index.claimBoundary.publicTheoremEmissionAllowed, true, 'index theorem emission must be activated');
          assert.equal(index.claimBoundary.publicTheoremStatement, 'P = NP', 'index theorem statement mismatch');
          assert.deepEqual(index.claimBoundary.remainingBlockers, [], 'index remaining blockers must be empty');
          assert.ok(index.payloads.some((entry) => entry.path === '/public/pnp-status.json'), 'index must include pnp-status payload');

          console.log('Activated PNP upstream status consistency accepted');
          NODE
