name: pnp-upstream-status-consistency

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  PNP_CORE_COMMIT: 8ac394c0fb19fbaabec883a498a1ad35d730b77f
  PNP_SOURCE_DIR: ${{ github.workspace }}/pnp

jobs:
  pnp-upstream-status-consistency:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pnplabs
    steps:
      - name: Check out companion repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          path: pnplabs

      - name: Check out exact reviewed core merge
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          repository: aisknab/pnp
          ref: ${{ env.PNP_CORE_COMMIT }}
          fetch-depth: 0
          fetch-tags: true
          path: pnp

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Compare current status and inventory with exact core bytes
        shell: bash
        run: |
          set -euo pipefail
          cmp public/pnp-status.json "$PNP_SOURCE_DIR/public/pnp-status.json"
          cmp public/pnp-theorem-inventory.json "$PNP_SOURCE_DIR/public/pnp-theorem-inventory.json"
          node tools/verify-release-seal.mjs
          node tools/check-cross-repo-targets.mjs --require-source
