name: pnp-upstream-status-consistency

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  pnp-upstream-status-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Compare conservative public payload with upstream PNP status
        run: |
          node --input-type=module <<'NODE'
          import assert from 'node:assert/strict';
          import { readFile } from 'node:fs/promises';

          const upstreamUrl = 'https://raw.githubusercontent.com/aisknab/pnp/main/public/pnp-status.json';

          function stableStringify(value) {
            if (Array.isArray(value)) return `[${value.map(stableStringify).join(',')}]`;
            if (value !== null && typeof value === 'object') return `{${Object.keys(value).sort().map((key) => `${JSON.stringify(key)}:${stableStringify(value[key])}`).join(',')}}`;
            return JSON.stringify(value);
          }

          function assertFormalBoundary(payload, label) {
            assert.equal(payload.kind, 'PNPFormalReconstructionStatus0', `${label}: kind mismatch`);
            assert.equal(payload.coordinate, 'PNP-FORMAL-RECONSTRUCTION-STATUS-2026-07-10-05', `${label}: coordinate mismatch`);
            assert.equal(payload.status, 'formal-reconstruction-in-progress', `${label}: status mismatch`);
            assert.equal(payload.mathematicalTheoremEstablished, false, `${label}: theorem must not be marked established`);
            assert.equal(payload.publicTheoremEmissionAllowed, false, `${label}: theorem emission must fail closed`);
            assert.equal(payload.publicTheoremStatement, null, `${label}: public theorem statement must be null`);
            assert.equal(payload.finalTheoremReady, false, `${label}: final theorem must not be ready`);
            assert.equal(payload.rootLeanTheoremPresent, false, `${label}: root theorem must not be marked present`);
            assert.equal(payload.rootLeanTheoremBuilt, false, `${label}: root theorem must not be marked built`);
            assert.equal(payload.rootLeanTheoremAxiomAuditPassed, false, `${label}: axiom audit must not be marked passed`);
            assert.equal(payload.projectSpecificAxiomsRemaining, true, `${label}: project-specific axioms must remain disclosed`);
            assert.equal(payload.leanToolchain, 'leanprover/lean4:v4.31.0', `${label}: Lean toolchain mismatch`);
            assert.equal(payload.leanCompilerVersion, '4.31.0', `${label}: Lean version mismatch`);
            assert.equal(payload.leanCompilerCommit, '68218e876d2a38b1985b8590fff244a83c321783', `${label}: Lean compiler commit mismatch`);
            assert.equal(payload.lakeVersion, '5.0.0-src+68218e8', `${label}: Lake version mismatch`);
            assert.equal(payload.elanVersion, '4.2.3', `${label}: Elan version mismatch`);
            assert.equal(payload.elanReleaseCommit, 'b6cec7e10fe4965a605aaf60d1cb4a5837f0462b', `${label}: Elan release commit mismatch`);
            assert.equal(payload.elanArchiveSha256, 'df0b2b3a439961ffcbb3985214365ffe40f49bc871df04dff268c7d8e21ca8b2', `${label}: Elan archive digest mismatch`);
            assert.equal(payload.leanBuildTarget, 'PNP', `${label}: Lean build target mismatch`);
            assert.equal(payload.leanRootModule, 'PNP', `${label}: Lean root module mismatch`);
            assert.equal(payload.leanRootStatusDeclaration, 'PNP.Main.rootTheoremStatus', `${label}: root-status declaration mismatch`);
            assert.equal(payload.leanBuildConfigurationPinned, true, `${label}: Lean configuration must be pinned`);
            assert.equal(payload.explicitLeanRootTargetPresent, true, `${label}: explicit Lean root must be present`);
            assert.equal(payload.leanLibraryTargetBuilt, true, `${label}: Lean library target must be built`);
            assert.equal(payload.leanSourcePlaceholderAuditPassed, true, `${label}: placeholder audit must pass`);
            assert.equal(payload.leanNANDDirectWireCoreFormalized, true, `${label}: direct-wire NAND core must be formalized`);
            assert.equal(payload.leanNANDDirectWireCoreAxiomAuditPassed, true, `${label}: direct-wire NAND core axiom audit must pass`);
            assert.equal(payload.leanNANDEnumeratorFormalized, true, `${label}: NAND enumerator must be formalized`);
            assert.equal(payload.leanNANDEnumeratorAxiomAuditPassed, true, `${label}: NAND enumerator axiom audit must pass`);
            assert.equal(payload.leanNANDExactWidthEnumerationComplete, true, `${label}: exact-width syntactic enumeration must be complete`);
            assert.equal(payload.leanNANDEnumeratorUsesOrderedGatePairs, true, `${label}: enumerator must preserve ordered NAND input pairs`);
            assert.equal(payload.leanNANDEnumeratorIncludesUniqueEmptyOutputTuple, true, `${label}: enumerator must include the unique empty output tuple`);
            assert.equal(payload.leanNANDEnumeratorDeduplicated, false, `${label}: enumerator must not be described as deduplicated`);
            assert.equal(payload.leanNANDSemanticEquivalenceDecidable, false, `${label}: semantic equivalence decision must remain incomplete`);
            assert.equal(payload.leanNANDMinimumAndSlackFormalized, false, `${label}: NAND minimum/slack must remain incomplete`);
            assert.equal(payload.leanCompatibleReplacementFormalized, false, `${label}: compatible replacement must remain incomplete`);
            assert.equal(payload.leanGlobalSlackLawFormalized, false, `${label}: global slack law must remain incomplete`);
            assert.equal(payload.leanLockedNANDBuilderFormalized, false, `${label}: locked-NAND builder must remain incomplete`);
            assert.equal(payload.leanLockedNANDThresholdFormalized, false, `${label}: locked-NAND threshold must remain incomplete`);
            assert.equal(payload.sorryOrAdmitInRootDependencyClosure, null, `${label}: absent root dependency closure must remain null`);
            assert.deepEqual(payload.projectSpecificAxiomInventory, [
              'PNP.SAT',
              'PNP.LockedNANDThreshold',
              'PNP.ResidualBandExactMinimization',
              'PNP.GeneratePCCPack',
              'PNP.CheckPCCPackexp',
            ], `${label}: project-specific axiom inventory mismatch`);
            assert.equal(payload.externalReviewIsMathematicalPremise, false, `${label}: external review must not be a premise`);
            assert.deepEqual(payload.verificationCommands, [
              'node pcc-formal-reconstruction-status0.mjs --json',
              'node pcc-formal-public-surface0.mjs --json',
              'npm run legacy:v0:check',
              'npm run pnp:verify -- --no-write',
              'node --test audits/lean-root-target0.test.mjs',
              'node --test audits/lean-nand-semantics0.test.mjs',
              'node --test audits/lean-nand-enumerator0.test.mjs',
              'lake build PNP',
              'lake env lean -DwarningAsError=true lean-audit/PNPBridgeAxiomAudit.lean',
              'lake env lean -DwarningAsError=true lean-audit/PNPNANDSemanticsAxiomAudit.lean',
              'lake env lean -DwarningAsError=true lean-audit/PNPNANDEnumeratorAxiomAudit.lean',
            ], `${label}: verification commands mismatch`);
            assert.equal(payload.legacyCheckerArchiveManifest, 'archive/legacy-v0/ARCHIVE.json', `${label}: archive manifest mismatch`);
            assert.equal(payload.legacyCheckerReplayCommand, 'npm run legacy:v0:replay -- --output /tmp/pnp-legacy-v0-7072f8d', `${label}: replay command mismatch`);
            assert.equal(payload.publicSurfaceBaselineCoordinate, 'PUBLIC-SURFACE-BASELINE-2026-07-10-NAND-ENUMERATOR-05', `${label}: public-surface baseline mismatch`);
            assert.deepEqual(payload.remainingBlockers, [
              'Formal.ConcreteComplexityModel',
              'Formal.ConcreteSAT',
              'Formal.LockedNANDThreshold',
              'Formal.ResidualBandMinimizer',
              'Formal.ZeroSlack',
              'Formal.PolynomialRuntimeAndCertificateBounds',
              'Formal.RootTheoremAndAxiomAudit',
            ], `${label}: formal blockers mismatch`);
            assert.ok(payload.nonClaims.includes('The formalized direct-wire NAND semantics layer does not by itself prove enumeration, minimum size, replacement/slack, the locked NAND builder, its threshold, SAT, or P = NP.'), `${label}: NAND-semantics non-claim missing`);
            assert.ok(payload.nonClaims.includes('The exact-width syntactic NAND enumeration does not prove canonical/deduplicated enumeration, semantic equivalence decision, minimum size, replacement/slack, the locked builder/threshold, SAT, or P = NP.'), `${label}: NAND-enumerator non-claim missing`);
          }

          const siteStatus = JSON.parse(await readFile('public/pnp-status.json', 'utf8'));
          const index = JSON.parse(await readFile('public/pnp-index.json', 'utf8'));
          const response = await fetch(upstreamUrl, { headers: { accept: 'application/json' } });
          if (!response.ok) throw new Error(`failed to fetch ${upstreamUrl}: ${response.status} ${response.statusText}`);
          const upstreamStatus = await response.json();

          assertFormalBoundary(siteStatus, 'site status payload');
          assertFormalBoundary(upstreamStatus, 'upstream status payload');
          assert.equal(stableStringify(siteStatus), stableStringify(upstreamStatus), 'site status payload drifted from upstream pnp/public/pnp-status.json');

          assert.equal(index.status, 'formal-reconstruction-status-payloads-ready');
          assert.equal(index.claimBoundary.mathematicalTheoremEstablished, false);
          assert.equal(index.claimBoundary.publicTheoremEmissionAllowed, false);
          assert.equal(index.claimBoundary.publicTheoremStatement, null);
          assert.equal(index.historicalRunIntakeFrozen, true);
          NODE
