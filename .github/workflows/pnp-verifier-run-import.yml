name: pnp-historical-verifier-run-records

on:
  pull_request:
    paths:
      - 'imports/pnp-verifier-runs/**'
      - 'public/pnp-verification-runs.json'
      - 'public/pnp-verifier-run-digest-comparison.json'
      - 'public/pnp-verifier-run-comparison-matrix.json'
      - 'public/pnp-verifier-run-matrix-summary.json'
      - 'tools/import-pnp-verifier-run.mjs'
      - 'tools/normalize-pnp-verifier-run.mjs'
      - 'tools/compare-pnp-verifier-runs.mjs'
      - 'tools/generate-pnp-verifier-run-matrix.mjs'
      - 'tools/generate-pnp-verifier-run-summary.mjs'
      - 'tests/unit/pnp-verifier-run-*.test.mjs'
      - '.github/workflows/pnp-verifier-run-import.yml'
  push:
    branches:
      - main
    paths:
      - 'public/pnp-verification-runs.json'
      - 'public/pnp-verifier-run-digest-comparison.json'
      - 'public/pnp-verifier-run-comparison-matrix.json'
      - 'public/pnp-verifier-run-matrix-summary.json'
      - 'tools/import-pnp-verifier-run.mjs'
      - 'tools/generate-pnp-verifier-run-matrix.mjs'
      - 'tools/generate-pnp-verifier-run-summary.mjs'
      - '.github/workflows/pnp-verifier-run-import.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  historical-run-records:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Validate historical normalization and comparison tools
        run: |
          npm run pnp:normalize-run -- --json tests/fixtures/pnp-activated-verifier-run.import.json
          npm run pnp:compare-runs -- --json tests/fixtures/pnp-activated-verifier-run.import.json tests/fixtures/pnp-activated-verifier-run.import.json
          npm run pnp:run-matrix -- --json public/pnp-verification-runs.json public/pnp-verifier-run-comparison-matrix.json
          npm run pnp:run-summary -- --json public/pnp-verifier-run-comparison-matrix.json public/pnp-verifier-run-matrix-summary.json
      - name: Confirm imports fail closed because intake is frozen
        run: |
          if npm run pnp:import-run -- --check tests/fixtures/pnp-activated-verifier-run.import.json public/pnp-verification-runs.json > /tmp/import-output.txt 2>&1; then
            cat /tmp/import-output.txt
            echo "historical registry unexpectedly accepted a new record"
            exit 1
          fi
          grep -q 'ImportRun.IntakeFrozen' /tmp/import-output.txt
      - name: Historical run tooling unit tests
        run: |
          node --test tests/unit/pnp-verifier-run-import.test.mjs
          node --test tests/unit/pnp-verifier-run-normalization.test.mjs
          node --test tests/unit/pnp-verifier-run-digest-comparison.test.mjs
          node --test tests/unit/pnp-verifier-run-comparison-matrix.test.mjs
          node --test tests/unit/pnp-verifier-run-matrix-summary.test.mjs
