name: review-smoke

on:
  push:
  pull_request:

jobs:
  review-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Public payload unit tests
        run: node --test tests/unit/pnp-public-payloads.test.mjs
      - name: Formal-reconstruction copy and fail-closed tests
        run: node --test tests/unit/pnp-activated-copy-refresh.test.mjs
      - name: Superseded-activation overclaim guard tests
        run: node --test tests/unit/pnp-activated-overclaim-guard.test.mjs
      - name: Frozen historical verification-run schema tests
        run: node --test tests/unit/pnp-activated-verification-run-schema.test.mjs
      - name: Remaining unit tests
        run: |
          shopt -s nullglob
          files=()
          for f in tests/unit/*.test.mjs; do
            case "$f" in
              tests/unit/pnp-public-payloads.test.mjs|tests/unit/pnp-activated-copy-refresh.test.mjs|tests/unit/pnp-activated-overclaim-guard.test.mjs|tests/unit/pnp-activated-verification-run-schema.test.mjs) ;;
              *) files+=("$f") ;;
            esac
          done
          if [ "${#files[@]}" -gt 0 ]; then
            node --test "${files[@]}"
          fi
      - name: Release seal and minimal examples
        run: npm run repro:smoke
      - name: Negative fixture tests
        run: npm run test:negative
      - name: Documentation link checks
        run: npm run test:docs
