name: review-smoke

on:
  push:
  pull_request:

jobs:
  review-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Unit, negative, example, reproducibility, and docs checks
        run: npm test
      - name: Prepare main checkout snapshot
        run: |
          git fetch origin main
          git checkout --detach origin/main
      - uses: actions/upload-artifact@v4
        with:
          name: pnplabs-main-checkout
          path: .
          include-hidden-files: true
          retention-days: 1
