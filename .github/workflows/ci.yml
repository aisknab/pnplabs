name: review-smoke

on:
  push:
  pull_request:

jobs:
  review-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Unit, negative, example, reproducibility, and docs checks
        run: npm test
