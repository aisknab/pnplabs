name: review-smoke

on:
  push:
  pull_request:

jobs:
  review-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Unit tests
        run: npm run test:unit
      - name: Release seal and minimal examples
        run: npm run repro:smoke
      - name: Negative fixture tests
        run: npm run test:negative
      - name: Documentation link checks
        run: npm run test:docs
