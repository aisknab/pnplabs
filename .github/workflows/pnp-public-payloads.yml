name: pnp-public-payloads

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  pnp-public-payloads:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Check conservative PNP formal-reconstruction payload boundary
        run: node --test tests/unit/pnp-public-payloads.test.mjs
