<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="pnp-mark-title pnp-mark-desc">
  <title id="pnp-mark-title">PNP Labs equation mark</title>
  <desc id="pnp-mark-desc">The equation P equals NP on a dark verification tile, with the equality highlighted in red.</desc>
  <rect width="64" height="64" fill="#0d1117"/>
  <g fill="#f5f1e8" font-family="'Times New Roman', Times, Georgia, serif" font-size="20.8" font-weight="700">
    <text x="9.8" y="39.8">P</text>
    <text x="34.5" y="39.8">NP</text>
  </g>
  <rect x="24.75" y="27.25" width="7.5" height="2.8" rx="1.4" fill="#a72032"/>
  <rect x="24.75" y="33.5" width="7.5" height="2.8" rx="1.4" fill="#a72032"/>
</svg>
